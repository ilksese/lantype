<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LanType</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  user-select: none;
}
.drag-handle {
  width: 100%;
  height: 28px;
  flex-shrink: 0;
}
.container {
  width: 100%;
  max-width: 300px;
  padding: 0 20px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  flex: 1;
}
.qr-box {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  width: 220px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.qr-box img { width: 100%; height: 100%; image-rendering: pixelated; }
.device-name { font-size: 18px; font-weight: 600; }
.address { font-size: 12px; color: #888; word-break: break-all; text-align: center; }
.privacy-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: #aaa;
}
.toggle {
  position: relative;
  width: 42px; height: 24px;
  background: #444;
  border-radius: 12px;
  cursor: pointer;
  transition: background .2s;
}
.toggle.active { background: #4caf50; }
.toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 20px; height: 20px;
  background: #fff;
  border-radius: 50%;
  transition: transform .2s;
}
.toggle.active::after { transform: translateX(18px); }
.hint { font-size: 11px; color: #666; text-align: center; margin-top: 4px; }
.clients-section {
  width:100%;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.clients-title {
  font-size:13px;
  color:#888;
  text-align:center;
}
.clients-list {
  display:flex;
  flex-direction:column;
  gap:6px;
  max-height:200px;
  overflow-y:auto;
}
.client-card {
  background:rgba(255,255,255,.06);
  border-radius:10px;
  padding:10px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.client-info {
  display:flex;
  flex-direction:column;
  gap:2px;
  flex:1;
  min-width:0;
}
.client-name {
  font-size:13px;
  font-weight:500;
  color:#c4b5fd;
}
.client-ip {
  font-size:11px;
  color:#666;
}
.client-actions {
  display:flex;
  gap:6px;
  flex-shrink:0;
}
.btn-disconnect,.btn-block {
  border:none;
  border-radius:6px;
  padding:4px 10px;
  font-size:11px;
  cursor:pointer;
  transition:opacity .15s;
}
.btn-disconnect { background:#3b3b5c; color:#ccc; }
.btn-disconnect:hover { background:#4b4b6c; }
.btn-block { background:#5c2e3a; color:#f87171; }
.btn-block:hover { background:#6c3e4a; }
</style>
</head>
<body>
<div class="drag-handle" data-tauri-drag-region></div>
<div class="container">
  <div class="device-name" id="deviceName">--</div>
  <div class="qr-box"><img id="qrImage" src="" alt="QR Code"></div>
  <div class="address" id="address">--</div>
  <div class="clients-section" id="clientsSection" style="display:none">
    <div class="clients-title">已连接设备</div>
    <div class="clients-list" id="clientsList"></div>
  </div>
  <div class="privacy-row">
    <span>允许被发现</span>
    <div class="toggle active" id="privacyToggle"></div>
  </div>
  <div class="hint">扫码连接 · 手机浏览器输入文字</div>
</div>
<script>
const invoke = window.__TAURI_INTERNALS__.invoke;

async function refresh() {
  const raw = await invoke('get_connection_info');
  const info = JSON.parse(raw);
  document.getElementById('deviceName').textContent = info.deviceName;
  document.getElementById('qrImage').src = info.qrDataUrl;
  document.getElementById('address').textContent = info.httpUrl;
}
refresh();

const toggle = document.getElementById('privacyToggle');
toggle.addEventListener('click', async () => {
  const enabled = await invoke('toggle_privacy');
  toggle.classList.toggle('active', enabled);
});

const { listen } = window.__TAURI__.event;

function renderDeviceList(clients) {
  var section = document.getElementById('clientsSection');
  var list = document.getElementById('clientsList');
  if (!clients || clients.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'flex';
  list.innerHTML = '';
  clients.forEach(function(c) {
    var card = document.createElement('div');
    card.className = 'client-card';
    card.innerHTML =
      '<div class="client-info">' +
        '<div class="client-name">' + escapeHtml(c.device_name) + '</div>' +
        '<div class="client-ip">' + escapeHtml(c.ip) + '</div>' +
      '</div>' +
      '<div class="client-actions">' +
        '<button class="btn-disconnect">断开</button>' +
        '<button class="btn-block">拉黑</button>' +
      '</div>';
    card.querySelector('.btn-disconnect').addEventListener('click', function() {
      disconnectClient(c.id);
    });
    card.querySelector('.btn-block').addEventListener('click', function() {
      blockClient(c.id);
    });
    list.appendChild(card);
  });
}

function escapeHtml(s) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(s));
  return div.innerHTML;
}

function disconnectClient(id) {
  invoke('disconnect_device', { clientId: id }).catch(function(e) {
    console.error('disconnect failed', e);
  });
}

function blockClient(id) {
  invoke('block_device', { clientId: id }).catch(function(e) {
    console.error('block failed', e);
  });
}

// Load initial connected devices
invoke('get_connected_devices').then(function(raw) {
  renderDeviceList(JSON.parse(raw));
}).catch(function(e) {
  console.error('get_connected_devices failed', e);
});

// Listen for real-time updates
listen('clients-changed', function(event) {
  renderDeviceList(event.payload);
});
</script>
</body>
</html>
