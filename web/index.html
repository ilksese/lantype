<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LanType</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  user-select: none;
}
.drag-handle {
  width: 100%;
  height: 28px;
  flex-shrink: 0;
}
.container {
  width: 100%;
  max-width: 300px;
  padding: 0 20px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  flex: 1;
}
.qr-box {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  width: 220px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.qr-box img { width: 100%; height: 100%; image-rendering: pixelated; }
.device-name { font-size: 18px; font-weight: 600; }
.address { font-size: 12px; color: #888; word-break: break-all; text-align: center; }
.privacy-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: #aaa;
}
.toggle {
  position: relative;
  width: 42px; height: 24px;
  background: #444;
  border-radius: 12px;
  cursor: pointer;
  transition: background .2s;
}
.toggle.active { background: #4caf50; }
.toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 20px; height: 20px;
  background: #fff;
  border-radius: 50%;
  transition: transform .2s;
}
.toggle.active::after { transform: translateX(18px); }
.hint { font-size: 11px; color: #666; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
<div class="drag-handle" data-tauri-drag-region></div>
<div class="container">
  <div class="device-name" id="deviceName">--</div>
  <div class="qr-box"><img id="qrImage" src="" alt="QR Code"></div>
  <div class="address" id="address">--</div>
  <div class="privacy-row">
    <span>允许被发现</span>
    <div class="toggle active" id="privacyToggle"></div>
  </div>
  <div class="hint">扫码连接 · 手机浏览器输入文字</div>
</div>
<script>
const invoke = window.__TAURI_INTERNALS__.invoke;

async function refresh() {
  const raw = await invoke('get_connection_info');
  const info = JSON.parse(raw);
  document.getElementById('deviceName').textContent = info.deviceName;
  document.getElementById('qrImage').src = info.qrDataUrl;
  document.getElementById('address').textContent = info.httpUrl;
}
refresh();

const toggle = document.getElementById('privacyToggle');
toggle.addEventListener('click', async () => {
  const enabled = await invoke('toggle_privacy');
  toggle.classList.toggle('active', enabled);
});
</script>
</body>
</html>
